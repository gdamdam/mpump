<!doctype html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Font Compare</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0b1a0b; color: #c8e6c8; font-family: system-ui; height: 100vh; display: flex; flex-direction: column; }
  iframe { flex: 1; border: none; width: 100%; }
  nav { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #122212; border-top: 1px solid #2a4a2a; }
  button { padding: 8px 16px; background: #1a3a1a; border: 1px solid #2a4a2a; color: #66ff99; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; }
  button:hover { background: #2a4a2a; }
  .current { flex: 1; text-align: center; font-size: 15px; font-weight: 700; color: #66ff99; }
  .idx { color: #7a9a7a; font-weight: 400; }
</style>
</head><body>
<iframe id="frame" src="./landing.html"></iframe>
<nav>
  <button id="prev">&#9664; Prev</button>
  <span class="current" id="label">Loading...</span>
  <button id="next">Next &#9654;</button>
</nav>
<script>
const fonts = [
  { file: "landing-font-g.html", name: "Current — Chakra Petch + original buttons" },
  { file: "landing-btn-1.html", name: "1 — Hard Edge (TR-808, sharp corners, uppercase)" },
  { file: "landing-btn-2.html", name: "2 — Neon Glow (pulsing outline, rave/club)" },
  { file: "landing-btn-3.html", name: "3 — Minimal Wire (Bauhaus, bottom-heavy border)" },
  { file: "landing-btn-4.html", name: "4 — Gradient Slab (Ableton-ish, solid fill)" },
  { file: "landing-btn-5.html", name: "5 — Outline Capsule (Elektron, pill outline)" },
  { file: "landing-btn-6.html", name: "6 — Clipped Corner (circuit board, angled cuts)" },
  { file: "landing-btn-7.html", name: "7 — Skeuomorphic Push (hardware button, 3D)" },
  { file: "landing-btn-8.html", name: "8 — Dot Matrix (LED display, mono, dark)" },
  { file: "landing-btn-9.html", name: "9 — Glass Morph (frosted, backdrop blur)" },
  { file: "landing-btn-10.html", name: "10 — Brutalist Mono (raw, anti-design, B&W)" },
];
let idx = 0;
const frame = document.getElementById("frame");
const label = document.getElementById("label");
function show() {
  frame.src = "./" + fonts[idx].file;
  label.innerHTML = `<span class="idx">${idx + 1}/${fonts.length}</span> ${fonts[idx].name}`;
}
document.getElementById("prev").onclick = () => { idx = (idx - 1 + fonts.length) % fonts.length; show(); };
document.getElementById("next").onclick = () => { idx = (idx + 1) % fonts.length; show(); };
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") { idx = (idx - 1 + fonts.length) % fonts.length; show(); }
  if (e.key === "ArrowRight") { idx = (idx + 1) % fonts.length; show(); }
});
show();
</script>
</body></html>
