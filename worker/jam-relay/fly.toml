app = 'mpump-jam-relay'
primary_region = 'ams'

[build]

[[services]]
  protocol = 'tcp'
  internal_port = 4444

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[http_service]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
