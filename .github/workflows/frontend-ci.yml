name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mpump/server/package-lock.json

      - name: Install dependencies
        working-directory: mpump/server
        run: npm ci

      - name: Run tests
        working-directory: mpump/server
        run: npm test

      - name: Build
        working-directory: mpump/server
        run: npm run build
